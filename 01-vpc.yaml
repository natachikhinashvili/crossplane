apiVersion: ec2.aws.upbound.io/v1beta1
kind: VPC
metadata:
  name: localstack-vpc
  labels:
    network: localstack-demo
spec:
  forProvider:
    region: us-east-1
    cidrBlock: 10.0.0.0/16
    enableDnsSupport: true
    enableDnsHostnames: true
    tags:
      Name: localstack-vpc
  providerConfigRef:
    name: default
